    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        /* ИГРА */
        #game-screen { background: #000; z-index: 50; }
        #counter { position: absolute; top: 60px; right: 30px; color: #39ff14; font-size: 4rem; z-index: 10; text-shadow: 0 0 20px #39ff14; }
        #game-img { width: 100%; height: 100%; object-fit: cover; position: absolute; }

        @keyframes blast { 0% { transform: scale(0.5); opacity: 0; } 50% { opacity: 1; } 100% { transform: scale(2); opacity: 0; } }

        /* КНОПКИ */
        .btn { background: rgba(0,0,0,0.9); color: #fff; border: 2px solid #39ff14; padding: 15px 30px; border-radius: 50px; font-size: 1.3rem; font-family: 'Orbitron'; margin: 10px; cursor: pointer; text-align: center; box-shadow: 0 0 15px #39ff14, inset 0 0 5px #39ff14; text-shadow: 0 0 5px #fff; transition: 0.3s; }
        .shop-btn { border-color: #00fbff; box-shadow: 0 0 15px #00fbff, inset 0 0 5px #00fbff; }
        .upg-btn { border-color: #ff00ff; box-shadow: 0 0 15px #ff00ff, inset 0 0 5px #ff00ff; color: #ff00ff; }
        .buy-btn { background: #ff00ff; border: none; padding: 8px; border-radius: 5px; width: 100%; font-family: 'Orbitron'; font-size: 0.6rem; font-weight: bold; margin-top: 5px; color: #fff; cursor: pointer; box-shadow: 0 0 10px #ff00ff; }
        .close-btn { background: #000; color: #ff00ff; border: 2px solid #ff00ff; padding: 15px; width: 90%; border-radius: 15px; font-family: 'Orbitron'; font-weight: bold; margin-top: 10px; cursor: pointer; box-shadow: 0 0 15px #ff00ff; }

<body oncontextmenu="return false;">

    <div id="loading-screen" class="screen active">
        <div class="loader-container"><div id="loader-bar"></div></div>
    </div>

    <div id="nickname-screen" class="screen">
        <div class="nick-box">
            <h2 style="color:#ff00ff; text-shadow: 0 0 10px #ff00ff;">ВХОД SV</h2>
            <input type="text" id="nick-input" placeholder="Введите имя...">
            <button class="btn" style="font-size: 1rem; border-color: #ff00ff; box-shadow: 0 0 15px #ff00ff;" onclick="saveNick()">ВОЙТИ</button>
        </div>
    </div>

    <div id="menu-screen" class="screen">
        <div class="stats">
            <span id="player-name" style="color:#00fbff; text-shadow: 0 0 5px #00fbff;">АКК: ...</span><br>
            <span style="color: #39ff14;">🪙:</span> <span id="coins-ui">0</span> | <span style="color: #ff00ff;">🍾:</span> <span id="caps-ui">0</span>
        </div>
        <button class="btn" onclick="startGame()">ИГРАТЬ</button>
        <button class="btn shop-btn" onclick="openShop()">МАГАЗИН SV</button>
        <button class="btn upg-btn" onclick="openUpgrade()">ПРОКАЧКА</button>
    </div>

    <div id="upgrade-screen" class="screen">
        <button class="back-nav" onclick="showMenu()"><</button>
        <h2 style="color:#ff00ff; text-shadow: 0 0 10px #ff00ff;">ПРОКАЧКА</h2>
        <div class="upgrade-window">
            <div id="lvl-txt" style="font-size: 1.5rem; color:#39ff14;">LVL 0</div>
            <div class="progress-bar-wrap">
                <div id="progress-fill"></div>
            </div>
            <button class="upgrade-btn-neon" onclick="buyLevel()">Прокачать 50 🪙</button>
        </div>
    </div>

    <div id="shop-screen" class="screen">
        <h2 style="color:#00fbff; margin-top: 10px; text-shadow: 0 0 10px #00fbff;">SV МАРКЕТ</h2>
        
        <div class="sv-storage">
            <h4 style="color:#39ff14; margin: 0 0 5px 0; font-size: 0.8rem; text-shadow: 0 0 5px #39ff14;">📦 ХРАНИЛИЩЕ SV</h4>
            <div style="font-size: 0.6rem; color: #aaa;">Бонус: <span id="bonus-status" style="color:#39ff14">НЕАКТИВЕН</span></div>
            <div style="font-size: 0.6rem; color: #aaa;">Баланс: <span style="color:#39ff14">🪙</span> <span id="s-coins">0</span> | <span style="color:#ff00ff">🍾</span> <span id="s-caps">0</span></div>
        </div>

        <div class="shop-grid">
            <div class="shop-item">
                <div class="promo-badge">КЕЙС</div>
                <img src="https://cdn-icons-png.flaticon.com/512/3124/3124112.png">
                <div style="font-size:0.5rem; color:#00fbff">ЗОЛОТОЙ КЕЙС</div>
                <button class="buy-btn" onclick="buyItem('case', 150, 'caps')">150 🍾</button>
            </div>
            <div class="shop-item">
                <div class="promo-badge">ВЫГОДА</div>
                <img src="https://cdn-icons-png.flaticon.com/512/2953/2953536.png">
                <div style="font-size:0.5rem; color:#00fbff">200 МОНЕТ</div>
                <button class="buy-btn" style="background:#39ff14; color:#000;" onclick="buyItem('coins_pack', 20, 'caps')">20 🍾</button>
            </div>
            <div class="shop-item">
                <img src="https://cdn-icons-png.flaticon.com/512/1162/1162153.png">
                <div style="font-size:0.5rem; color:#00fbff">ПРОМОКОДЫ</div>
                <button class="buy-btn" style="background:#00fbff; color:#000;" onclick="applyPromo()">ВВОД</button>
            </div>
            <div class="shop-item">
                <div class="promo-badge">Шанс +1</div>
                <img src="https://cdn-icons-png.flaticon.com/512/883/883360.png">
                <div style="font-size:0.5rem; color:#00fbff">РАНДОМ СКИН</div>
                <button class="buy-btn" onclick="buyItem('skin', 250, 'caps')">250 🍾</button>
            </div>
        </div>

        <button class="close-btn" onclick="closeShop()">ЗАКРЫТЬ [X]</button>
    </div>

    <div id="game-screen" class="screen">
        <div id="chance-badge">ШАНС ВЫЖИТЬ АКТИВЕН</div>
        <div id="counter">0/5</div>
        <div id="boom">💥</div>
        <img id="game-img" src="https://i.ibb.co/nsvmZN7s/IMG-4687.jpg">
    </div>

    <script>
        let score = 0;
        let coins = parseInt(localStorage.getItem('b_coins')) || 0;
        let caps = parseInt(localStorage.getItem('b_caps')) || 0;
        let lvl = parseInt(localStorage.getItem('b_lvl')) || 0;
        let exp = parseInt(localStorage.getItem('b_exp')) || 0; // 0 или 50
        let bonusTime = parseInt(localStorage.getItem('bonus_time')) || 0;
        let chanceUsed = false;
        let startY, startTime;

        const ADMIN_NICK = "Dlxxisn1927367вдвшочлвщossihxjsd$023837$.&:&:$.skjddk";

        window.onload = () => {
            updateUI();
            setTimeout(() => {
                document.getElementById('loading-screen').classList.remove('active');
                if (localStorage.getItem('bottle_nick')) {
                    checkAdmin(localStorage.getItem('bottle_nick'));
                    showMenu();
                }
                else document.getElementById('nickname-screen').classList.add('active');
            }, 5000);
        };

        function checkAdmin(nick) {
            if(nick === ADMIN_NICK) {
                coins = 210;
                caps = 150;
                saveData();
            }
        }

        function updateUI() {
            document.getElementById('coins-ui').innerText = coins;
            document.getElementById('caps-ui').innerText = caps;
            document.getElementById('s-coins').innerText = coins;
            document.getElementById('s-caps').innerText = caps;
            document.getElementById('lvl-txt').innerText = "LVL " + lvl;
            document.getElementById('progress-fill').style.width = exp + "%";
            
            const now = Date.now();
            const status = document.getElementById('bonus-status');
            if (bonusTime > now) {
                let left = Math.round((bonusTime - now) / 60000);
                status.innerText = "АКТИВЕН (" + left + " мин)";
                status.style.color = "#39ff14";
            } else {
                status.innerText = "НЕАКТИВЕН";
                status.style.color = "#ff4444";
            }
        }

        function saveNick() {
            let n = document.getElementById('nick-input').value.trim();
            if(n) { 
                localStorage.setItem('bottle_nick', n); 
                checkAdmin(n);
                showMenu(); 
            }
        }

        function showMenu() {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('menu-screen').classList.add('active');
            let n = localStorage.getItem('bottle_nick');
            document.getElementById('player-name').innerText = "АКК: " + (n.length > 10 ? n.substring(0,10)+"..." : n);
            updateUI();
        }

        function openUpgrade() {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('upgrade-screen').classList.add('active');
            updateUI();
        }

        function buyLevel() {
            if(coins >= 50) {
                coins -= 50;
                lvl++;
                exp = 0;
                saveData();
                alert("УРОВЕНЬ ПОВЫШЕН! ТЕПЕРЬ LVL " + lvl);
            } else {
                alert("НЕДОСТАТОЧНО МОНЕТ! 🪙");
            }
        }

        function openShop() { document.getElementById('shop-screen').classList.add('active'); updateUI(); }
        function closeShop() { document.getElementById('shop-screen').classList.remove('active'); }

        function buyItem(type, price, cur) {
            if (cur === 'caps' && caps < price) return alert("МАЛО КРЫШЕК! 🍾");
            if (cur === 'coins' && coins < price) return alert("МАЛО МОНЕТ! 🪙");

            if (cur === 'caps') caps -= price; else coins -= price;

            if (type === 'case') {
                let prize = Math.random() > 0.5 ? "coins" : "caps";
                let amt = prize === "coins" ? 300 : 50;
                if (prize === "coins") coins += amt; else caps += amt;
                alert("КЕЙС ОТКРЫТ! НАГРАДА: " + amt + (prize === "coins" ? " 🪙" : " 🍾"));
            } else if (type === 'coins_pack') {
                coins += 200;
                alert("ОБМЕН ЗАВЕРШЕН: +200 🪙");
            } else if (type === 'skin') {
                bonusTime = Date.now() + (30 * 60 * 1000);
                localStorage.setItem('bonus_time', bonusTime);
                alert("СКИН КУПЛЕН! ШАНС ВЫЖИТЬ НА 30 МИН АКТИВИРОВАН! ✨");
            }
            saveData();
        }

        function saveData() {
            localStorage.setItem('b_coins', coins);
            localStorage.setItem('b_caps', caps);
            localStorage.setItem('b_lvl', lvl);
            localStorage.setItem('b_exp', exp);
            updateUI();
        }

        function startGame() {
            score = 0;
            chanceUsed = false;
            document.getElementById('counter').innerText = "0/5";
            document.getElementById('game-img').src = "https://i.ibb.co/nsvmZN7s/IMG-4687.jpg";
            document.getElementById('menu-screen').classList.remove('active');
            document.getElementById('game-screen').classList.add('active');
            
            if (Date.now() < bonusTime) {
                document.getElementById('chance-badge').style.display = 'block';
            } else {
                document.getElementById('chance-badge').style.display = 'none';
            }
        }

        const gameZone = document.getElementById('game-screen');
        gameZone.addEventListener('touchstart', e => { startY = e.touches[0].clientY; startTime = Date.now(); });
        gameZone.addEventListener('touchend', e => {
            let dist = startY - e.changedTouches[0].clientY;
            let time = Date.now() - startTime;
            if (dist > 60) {
                if (time > 700) handleWin(); else handleLose();
            }
        });

        function handleWin() {
            score++;
            document.getElementById('counter').innerText = score + "/5";
            document.getElementById('boom').style.display = 'block';
            setTimeout(() => document.getElementById('boom').style.display = 'none', 500);

            if (score === 1 || score === 2) document.getElementById('game-img').src = "https://i.ibb.co/wFzjhB0m/image.jpg"; 
            else if (score === 3) document.getElementById('game-img').src = "https://i.ibb.co/nsvmZN7s/IMG-4687.jpg"; 

            if (score >= 5) {
                setTimeout(() => {
                    coins += 20; caps += 50; 
                    // Логика полоски: 1 победа = +50%
                    exp += 50;
                    if(exp >= 100) {
                        exp = 0;
                        lvl++;
                    }
                    saveData();
                    alert("ПОБЕДА! +20🪙 +50🍾 | Опыт +50%");
                    showMenu(); 
                }, 800);
            }
        }

        function handleLose() {
            if (Date.now() < bonusTime && !chanceUsed) {
                chanceUsed = true;
                document.getElementById('chance-badge').style.display = 'none';
                alert("БУТЫЛКА УПАЛА! НО У ТЕБЯ ЕСТЬ ВТОРОЙ ШАНС! 🔥");
                document.getElementById('game-img').src = "https://i.ibb.co/nsvmZN7s/IMG-4687.jpg";
                return;
            }
            document.getElementById('game-img').src = "https://i.ibb.co/rBLp9Yg/image.jpg";
            setTimeout(() => { alert("ПРОМАХ! КОНЕЦ ИГРЫ"); showMenu(); }, 400);
        }

        function applyPromo() {
            let p = prompt("КОД:");
            if(p === 'mateo') { coins += 150; alert("+150 🪙"); saveData(); }
        }

        document.addEventListener('touchmove', e => e.preventDefault(), { passive: false });
    </script>
</body>
</html>
