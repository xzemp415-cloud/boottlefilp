<!DOCTYPE html>
<html lang="ru">
<head>
  <link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="https://i.ibb.co/DPVwY81m/IMG-4406.jpg">
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }
</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Бутылочка 2026 SV</title>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');
        * { -webkit-tap-highlight-color: transparent; user-select: none; touch-action: none; box-sizing: border-box; }
        
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background: #000; color: white; 
            font-family: 'Orbitron', sans-serif; position: fixed;
        }

        .screen { 
            display: none; width: 100vw; height: 100vh; 
            position: absolute; flex-direction: column; align-items: center; justify-content: center; 
            background-size: cover; background-position: center; 
        }
        .active { display: flex !important; }

        /* ЗАГРУЗКА */
        #loading-screen { background-image: url('https://i.ibb.co/jvBPTLXp/IMG-4177.jpg'); z-index: 1000; }
        .loader-container { position: absolute; bottom: 15%; width: 80%; height: 8px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; border: 1px solid #39ff14; box-shadow: 0 0 10px #39ff14; }
        #loader-bar { width: 0%; height: 100%; background: #39ff14; animation: loadAnim 10s linear forwards; }
        @keyframes loadAnim { from { width: 0%; } to { width: 100%; } }

        /* НИК */
        #nickname-screen { background: #000; z-index: 900; }
        .nick-box { background: #111; padding: 30px; border: 2px solid #ff00ff; border-radius: 20px; text-align: center; width: 85%; box-shadow: 0 0 20px #ff00ff; }
        input { padding: 12px; margin: 20px 0; border-radius: 10px; border: 1px solid #00fbff; text-align: center; font-family: sans-serif; width: 100%; background: #222; color: #fff; outline: none; box-shadow: inset 0 0 5px #00fbff; }

        /* МЕНЮ */
        #menu-screen { background-image: url('https://i.ibb.co/844Cn9dP/IMG-4684.jpg'); z-index: 100; }
        .stats { position: absolute; top: 60px; left: 20px; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 15px; border-left: 5px solid #39ff14; min-width: 150px; box-shadow: 0 0 15px rgba(57, 255, 20, 0.3); }

        /* МАГАЗИН */
        #shop-screen { background: #0a0a0a; z-index: 1100; justify-content: flex-start; padding-top: 20px; overflow-y: auto; }
        .shop-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 15px; width: 100%; }
        .shop-item { background: #1a1a1a; padding: 10px; border-radius: 12px; border: 1px solid #ff00ff; text-align: center; position: relative; box-shadow: 0 0 10px rgba(255, 0, 255, 0.2); }
        .shop-item img { width: 45px; height: 45px; margin-bottom: 5px; }
        .promo-badge { position: absolute; top: -5px; right: -5px; background: #ff00ff; color: #fff; font-size: 0.5rem; padding: 2px 5px; border-radius: 5px; animation: pulse 1s infinite; box-shadow: 0 0 5px #ff00ff; }
        
        .sv-storage { width: 90%; background: #111; border: 2px dashed #00fbff; border-radius: 15px; padding: 15px; margin-top: 10px; text-align: left; box-shadow: 0 0 10px rgba(0, 251, 255, 0.2); }
        
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        /* ИГРА */
        #game-screen { background: #000; z-index: 50; }
        #counter { position: absolute; top: 60px; right: 30px; color: #39ff14; font-size: 4rem; z-index: 10; text-shadow: 0 0 20px #39ff14; }
        #game-img { width: 100%; height: 100%; object-fit: cover; position: absolute; }
        #boom { display: none; position: absolute; font-size: 10rem; z-index: 20; animation: blast 0.5s ease-out; }
        @keyframes blast { 0% { transform: scale(0.5); opacity: 0; } 50% { opacity: 1; } 100% { transform: scale(2); opacity: 0; } }

        /* КНОПКИ В НЕОНОВОМ СТИЛЕ */
        .btn { background: rgba(0,0,0,0.9); color: #fff; border: 2px solid #39ff14; padding: 15px 30px; border-radius: 50px; font-size: 1.3rem; font-family: 'Orbitron'; margin: 10px; cursor: pointer; text-align: center; box-shadow: 0 0 15px #39ff14, inset 0 0 5px #39ff14; text-shadow: 0 0 5px #fff; transition: 0.3s; }
        .btn:active { transform: scale(0.95); box-shadow: 0 0 25px #39ff14; }
        
        .shop-btn { border-color: #00fbff; box-shadow: 0 0 15px #00fbff, inset 0 0 5px #00fbff; }
        
        .buy-btn { background: #ff00ff; border: none; padding: 8px; border-radius: 5px; width: 100%; font-family: 'Orbitron'; font-size: 0.6rem; font-weight: bold; margin-top: 5px; color: #fff; cursor: pointer; box-shadow: 0 0 10px #ff00ff; }
        .close-btn { background: #000; color: #ff00ff; border: 2px solid #ff00ff; padding: 15px; width: 90%; border-radius: 15px; font-family: 'Orbitron'; font-weight: bold; margin-top: 10px; cursor: pointer; box-shadow: 0 0 15px #ff00ff; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="loading-screen" class="screen active">
        <div class="loader-container"><div id="loader-bar"></div></div>
    </div>

    <div id="nickname-screen" class="screen">
        <div class="nick-box">
            <h2 style="color:#ff00ff; text-shadow: 0 0 10px #ff00ff;">ВХОД SV</h2>
            <input type="text" id="nick-input" placeholder="Введите имя...">
            <button class="btn" style="font-size: 1rem; border-color: #ff00ff; box-shadow: 0 0 15px #ff00ff;" onclick="saveNick()">ВОЙТИ</button>
        </div>
    </div>

    <div id="menu-screen" class="screen">
        <div class="stats">
            <span id="player-name" style="color:#00fbff; text-shadow: 0 0 5px #00fbff;">АКК: ...</span><br>
            <span style="color: #39ff14;">🪙:</span> <span id="coins-ui">0</span> | <span style="color: #ff00ff;">🍾:</span> <span id="caps-ui">0</span>
        </div>
        <button class="btn" onclick="startGame()">ИГРАТЬ</button>
        <button class="btn shop-btn" onclick="openShop()">МАГАЗИН SV</button>
    </div>

    <div id="shop-screen" class="screen">
        <h2 style="color:#00fbff; margin-top: 10px; text-shadow: 0 0 10px #00fbff;">SV МАРКЕТ</h2>
        
        <div class="sv-storage">
            <h4 style="color:#39ff14; margin: 0 0 5px 0; font-size: 0.8rem; text-shadow: 0 0 5px #39ff14;">📦 ХРАНИЛИЩЕ SV</h4>
            <div style="font-size: 0.6rem; color: #aaa;">Предметов: <span id="storage-count" style="color:#fff">0</span></div>
            <div style="font-size: 0.6rem; color: #aaa;">Баланс: <span style="color:#39ff14">🪙</span> <span id="s-coins" style="color:#fff">0</span> | <span style="color:#ff00ff">🍾</span> <span id="s-caps" style="color:#fff">0</span></div>
        </div>

        <div class="shop-grid">
            <div class="shop-item">
                <div class="promo-badge">АКЦИЯ -50%</div>
                <img src="https://cdn-icons-png.flaticon.com/512/3124/3124112.png">
                <div style="font-size:0.5rem; color:#00fbff">ЗОЛОТОЙ КЕЙС</div>
                <button class="buy-btn" onclick="buyItem('Золотой Кейс', 150, 'caps')">150 🍾</button>
            </div>
            <div class="shop-item">
                <div class="promo-badge">ХИТ!</div>
                <img src="https://cdn-icons-png.flaticon.com/512/2953/2953536.png">
                <div style="font-size:0.5rem; color:#00fbff">SV ЭНЕРГИЯ</div>
                <button class="buy-btn" style="background:#39ff14; color:#000; box-shadow: 0 0 10px #39ff14;" onclick="buyItem('Энергия', 80, 'coins')">80 🪙</button>
            </div>
            <div class="shop-item">
                <img src="https://cdn-icons-png.flaticon.com/512/1162/1162153.png">
                <div style="font-size:0.5rem; color:#00fbff">ПРОМОКОДЫ</div>
                <button class="buy-btn" style="background:#00fbff; color:#000; box-shadow: 0 0 10px #00fbff;" onclick="applyPromo()">ВВОД</button>
            </div>
            <div class="shop-item">
                <div class="promo-badge" style="background:#39ff14; color:#000; box-shadow: 0 0 5px #39ff14;">RANDOM</div>
                <img src="https://cdn-icons-png.flaticon.com/512/883/883360.png">
                <div style="font-size:0.5rem; color:#00fbff">РАНДОМ СКИН</div>
                <button class="buy-btn" onclick="buyItem('Случайный Скин', 250, 'caps')">250 🍾</button>
            </div>
        </div>

        <button class="close-btn" onclick="closeShop()">ЗАКРЫТЬ [X]</button>
    </div>

    <div id="game-screen" class="screen">
        <div id="counter">0/5</div>
        <div id="boom">💥</div>
        <img id="game-img" src="https://i.ibb.co/nsvmZN7s/IMG-4687.jpg">
    </div>

    <script>
        let score = 0, storage = 0;
        let coins = parseInt(localStorage.getItem('b_coins')) || 0;
        let caps = parseInt(localStorage.getItem('b_caps')) || 0;
        let startY, startTime;

        window.onload = () => {
            updateUI();
            setTimeout(() => {
                document.getElementById('loading-screen').classList.remove('active');
                if (localStorage.getItem('bottle_nick')) showMenu();
                else document.getElementById('nickname-screen').classList.add('active');
            }, 10000);
        };

        function saveNick() {
            let n = document.getElementById('nick-input').value.trim();
            if(n) { localStorage.setItem('bottle_nick', n); showMenu(); }
        }

        function showMenu() {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('menu-screen').classList.add('active');
            document.getElementById('player-name').innerText = "АКК: " + localStorage.getItem('bottle_nick');
            updateUI();
        }

        function updateUI() {
            document.getElementById('coins-ui').innerText = coins;
            document.getElementById('caps-ui').innerText = caps;
            document.getElementById('s-coins').innerText = coins;
            document.getElementById('s-caps').innerText = caps;
            document.getElementById('storage-count').innerText = storage;
        }

        function openShop() { 
            document.getElementById('shop-screen').classList.add('active'); 
            updateUI(); 
        }
        
        function closeShop() { 
            document.getElementById('shop-screen').classList.remove('active'); 
        }

        function buyItem(name, price, currency) {
            if (currency === 'coins') {
                if (coins >= price) {
                    coins -= price;
                    processPurchase(name);
                } else {
                    alert("НЕДОСТАТОЧНО МОНЕТ! 🪙");
                }
            } else if (currency === 'caps') {
                if (caps >= price) {
                    caps -= price;
                    processPurchase(name);
                } else {
                    alert("НЕДОСТАТОЧНО КРЫШЕК! 🍾");
                }
            }
        }

        function processPurchase(name) {
            storage++;
            saveData();
            alert(name + " КУПЛЕН И ДОБАВЛЕН В ХРАНИЛИЩЕ!");
        }

        function applyPromo() {
            let p = prompt("ВВЕДИТЕ КОД:");
            if(!p) return;
            if(p === 'BetaButelochka') { caps += 200; alert("АКТИВИРОВАНО: +200 🍾"); }
            else if(p === 'mateo') { coins += 150; alert("АКТИВИРОВАНО: +150 🪙"); }
            else { alert("НЕВЕРНЫЙ КОД!"); return; }
            saveData();
        }

        function saveData() {
            localStorage.setItem('b_coins', coins);
            localStorage.setItem('b_caps', caps);
            updateUI();
        }

        function startGame() {
            score = 0;
            document.getElementById('counter').innerText = "0/5";
            document.getElementById('game-img').src = "https://i.ibb.co/nsvmZN7s/IMG-4687.jpg";
            document.getElementById('menu-screen').classList.remove('active');
            document.getElementById('game-screen').classList.add('active');
        }

        const gameZone = document.getElementById('game-screen');
        gameZone.addEventListener('touchstart', e => { startY = e.touches[0].clientY; startTime = Date.now(); });
        gameZone.addEventListener('touchend', e => {
            let dist = startY - e.changedTouches[0].clientY;
            let time = Date.now() - startTime;
            if (dist > 60) {
                if (time > 700) handleWin(); else handleLose();
            }
        });

        function handleWin() {
            score++;
            document.getElementById('counter').innerText = score + "/5";
            document.getElementById('boom').style.display = 'block';
            setTimeout(() => document.getElementById('boom').style.display = 'none', 500);

            if (score === 1 || score === 2) {
                document.getElementById('game-img').src = "https://i.ibb.co/wFzjhB0m/image.jpg"; 
            } else if (score === 3) {
                document.getElementById('game-img').src = "https://i.ibb.co/nsvmZN7s/IMG-4687.jpg"; 
            }

            if (score >= 5) {
                setTimeout(() => {
                    coins += 20; 
                    caps += 50; 
                    saveData();
                    alert("ПОБЕДА 5/5! НАГРАДА: +20🪙 И +50🍾");
                    document.getElementById('game-screen').classList.remove('active');
                    showMenu(); 
                }, 800);
            }
        }

        function handleLose() {
            document.getElementById('game-img').src = "https://i.ibb.co/rBLp9Yg/image.jpg";
            setTimeout(() => {
                alert("ПРОМАХ!");
                document.getElementById('game-screen').classList.remove('active');
                showMenu();
            }, 400);
        }

        document.addEventListener('touchmove', e => e.preventDefault(), { passive: false });
    </script>
</body>
</html>
